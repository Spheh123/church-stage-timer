<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Display</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="display-only">

<div class="display-full">

  <div class="top-bar" id="serviceDisplay"></div>

  <div class="header" id="speakerName"></div>

  <div class="timer" id="timer">00:00</div>

  <div class="message" id="messageBox"></div>

  <div class="footer" id="currentTitle"></div>

</div>
<button onclick="goFullscreen()" style="position:absolute;bottom:10px;right:10px;">
  Fullscreen
</button>
<script type="module">
import { db, ref, onValue } from "./firebase.js";

onValue(ref(db, "live"), (snapshot) => {
  const data = snapshot.val();
  if (!data) return;

  const timerEl = document.getElementById("timer");
  const messageEl = document.getElementById("messageBox");

  // TEXT
  timerEl.innerText = data.time;
  document.getElementById("speakerName").innerText = data.speaker || "";
  document.getElementById("currentTitle").innerText = data.title || "";
  document.getElementById("serviceDisplay").innerText = data.service || "";

  messageEl.innerText = data.message || "";

  // COLOR
  timerEl.className = "timer " + (data.color || "white");

  // 🔥 SMART MESSAGE BEHAVIOR
  if (data.message && data.message.trim() !== "") {
    timerEl.style.fontSize = "110px";
    messageEl.style.display = "block";
  } else {
    timerEl.style.fontSize = "140px";
    messageEl.style.display = "none";
  }
});
</script>
</body>
</html>
