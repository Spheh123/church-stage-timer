<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stage Timer Display</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="display-only">
  <div class="display-full">
    <div class="display-orb orb-a"></div>
    <div class="display-orb orb-b"></div>

    <div class="display-head">
      <div class="top-bar" id="serviceDisplay"></div>
      <button id="fullscreenBtn" class="fullscreen-btn" type="button">Fullscreen</button>
    </div>

    <div class="display-focus">
      <div class="footer display-segment" id="currentTitle"></div>

      <div class="timer-card timer-card-live">
        <div class="dual-timer">
          <div class="time-panel clock-panel">
            <div class="timer-label">Real Time</div>
            <div class="clock-time" id="clockTime">00:00</div>
          </div>
          <div class="time-panel countdown-panel">
            <div class="timer-label">Countdown</div>
            <div class="timer" id="timer">00:00</div>
          </div>
        </div>
      </div>

      <div class="speaker-pill display-speaker" id="speakerName"></div>
      <div class="message" id="messageBox"></div>
      <div class="signature signature-display">Engineered by Sphelele Chavula</div>
    </div>
  </div>

  <script type="module">
    import { db, ref, set, onValue } from "./firebase.js";

    const SESSION_PATH = "sessionState";

    let session = createDefaultSession();
    let advancingToNext = false;

    onValue(ref(db, SESSION_PATH), (snapshot) => {
      const data = snapshot.val();
      if (!data) return;

      session = normalizeSession(data);
      renderDisplay();
    });

    setInterval(() => {
      renderClock();

      if (session.isRunning && getRemainingMs(session) <= 0) {
        autoAdvance();
        return;
      }

      renderDisplay();
    }, 1000);

    renderClock();
    renderDisplay();

    const btn = document.getElementById("fullscreenBtn");
    btn.addEventListener("click", async () => {
      if (!document.fullscreenElement) {
        await document.documentElement.requestFullscreen();
      } else {
        await document.exitFullscreen();
      }
    });

    function createDefaultSession() {
      return {
        serviceName: "",
        program: [],
        currentIndex: 0,
        remainingMs: 0,
        isRunning: false,
        endTime: null,
        message: ""
      };
    }

    function normalizeSession(data) {
      const program = Array.isArray(data.program)
        ? data.program
            .map((item) => ({
              title: String(item?.title || "").trim(),
              speaker: String(item?.speaker || "").trim(),
              duration: Number(item?.duration) > 0 ? Number(item.duration) : 0
            }))
            .filter((item) => item.title && item.duration > 0)
        : [];

      return {
        serviceName: String(data.serviceName || "").trim(),
        program,
        currentIndex: Math.min(Math.max(Number(data.currentIndex) || 0, 0), program.length),
        remainingMs: Math.max(Number(data.remainingMs) || 0, 0),
        isRunning: Boolean(data.isRunning),
        endTime: Number.isFinite(data.endTime) ? Number(data.endTime) : null,
        message: String(data.message || "")
      };
    }

    function getCurrentItem() {
      return session.program[session.currentIndex] || null;
    }

    function getRemainingMs(currentSession = session) {
      if (currentSession.isRunning && currentSession.endTime) {
        return Math.max(0, currentSession.endTime - Date.now());
      }

      return Math.max(currentSession.remainingMs || 0, 0);
    }

    function getCountdownView() {
      const remainingMs = getRemainingMs();
      const totalSeconds = Math.ceil(remainingMs / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;

      let color = "white";
      if (remainingMs > 0 && remainingMs <= 120000) color = "red";
      else if (remainingMs > 0 && remainingMs <= 180000) color = "orange";

      return {
        formatted: `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`,
        color
      };
    }

    function renderClock() {
      const now = new Date();
      const formatted = now.toLocaleTimeString([], {
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      });

      document.getElementById("clockTime").innerText = formatted;
    }

    function renderDisplay() {
      const countdown = getCountdownView();
      const currentItem = getCurrentItem();
      const timerEl = document.getElementById("timer");
      const message = session.message || "";

      timerEl.innerText = countdown.formatted;
      timerEl.className = `timer ${countdown.color}`;

      document.getElementById("speakerName").innerText = currentItem?.speaker || "Awaiting Speaker";
      document.getElementById("currentTitle").innerText = currentItem?.title || "Ready";
      document.getElementById("serviceDisplay").innerText = session.serviceName || "Service Not Named";
      document.getElementById("messageBox").innerText = message;

      document.body.classList.toggle("message-visible", Boolean(message.trim()));
    }

    function autoAdvance() {
      if (advancingToNext) return;
      advancingToNext = true;

      const nextIndex = session.currentIndex + 1;

      if (nextIndex >= session.program.length) {
        session = {
          ...session,
          currentIndex: session.program.length,
          remainingMs: 0,
          isRunning: false,
          endTime: null
        };
      } else {
        const nextDuration = session.program[nextIndex].duration * 60 * 1000;
        session = {
          ...session,
          currentIndex: nextIndex,
          remainingMs: nextDuration,
          isRunning: true,
          endTime: Date.now() + nextDuration
        };
      }

      set(ref(db, SESSION_PATH), {
        serviceName: session.serviceName,
        program: session.program,
        currentIndex: session.currentIndex,
        remainingMs: session.remainingMs,
        isRunning: session.isRunning,
        endTime: session.endTime,
        message: session.message,
        updatedAt: Date.now()
      });

      renderDisplay();
      advancingToNext = false;
    }
  </script>
</body>
</html>
